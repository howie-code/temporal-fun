name: Shared CI

on:
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run check:format

      - name: Check lints
        run: bun run check:lints

      - name: Run type check
        run: bun run check:types

      - name: Run build
        run: bun run build

      - name: Run tests
        run: bun run test
